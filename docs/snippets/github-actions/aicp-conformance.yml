name: AICP Conformance Evidence

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [ main ]

jobs:
  aicp-conformance:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install jsonschema pytest cryptography

      - name: Validate repository artifacts
        run: make validate

      - name: Run all conformance suites/profiles
        run: make conformance-all

      - name: Run reference tests
        run: make test

      - name: Upload conformance reports
        uses: actions/upload-artifact@v4
        with:
          name: aicp-conformance-reports
          path: |
            conformance/report*.json
