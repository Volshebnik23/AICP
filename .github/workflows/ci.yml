name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  validate-artifacts:
    name: Validate artifacts via one-command standard
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install validation deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install jsonschema

      - name: Run make validate
        run: make validate

      - name: Run make conformance
        run: make conformance

      - name: Run make release-check on main branch
        if: github.ref == 'refs/heads/main'
        run: make release-check

  python-reference-tests:
    name: Reference tests (optional)
    runs-on: ubuntu-latest
    needs: [ validate-artifacts ]

    steps:
      - uses: actions/checkout@v4

      - name: Detect python reference suite
        id: detect
        run: |
          if [ -d "reference/python" ] || [ -d "reference" ]; then
            echo "has_ref=true" >> $GITHUB_OUTPUT
          else
            echo "has_ref=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Python
        if: steps.detect.outputs.has_ref == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test deps
        if: steps.detect.outputs.has_ref == 'true'
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest jsonschema cryptography

      - name: Run pytest (if tests exist)
        if: steps.detect.outputs.has_ref == 'true'
        run: |
          set -e
          if ls **/test_*.py 1> /dev/null 2>&1; then
            pytest -q
          else
            echo "No pytest tests found; skipping."
          fi
