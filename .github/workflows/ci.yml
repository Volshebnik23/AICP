name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  validate-artifacts:
    name: Validate artifacts via one-command standard
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install validation and test deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install jsonschema pytest cryptography

      - name: Run make validate
        run: make validate

      - name: Run make conformance
        run: make conformance

      - name: Run make test
        run: make test

      - name: Run make conformance-ext on main branch
        if: github.ref == 'refs/heads/main'
        run: make conformance-ext

      - name: Run make release-check on main branch
        if: github.ref == 'refs/heads/main'
        run: make release-check
