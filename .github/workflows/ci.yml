name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  validate-artifacts:
    name: Validate artifacts via one-command standard
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install validation and test deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install jsonschema pytest cryptography

      - name: Run make validate
        run: make validate

      - name: Run make conformance
        run: make conformance

      - name: Run make test
        run: make test

      - name: Run make conformance-ext
        run: make conformance-ext

      - name: Run make conformance-bindings
        run: make conformance-bindings

      - name: Run make conformance-profiles
        run: make conformance-profiles

      - name: Run make release-check on main branch
        if: github.ref == 'refs/heads/main'
        run: make release-check

  typescript-sdk:
    name: TypeScript SDK tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run SDK tests
        run: |
          cd sdk/typescript
          npm ci
          npm test


  quickstart-smoke:
    name: Quickstart smoke (TS + Python)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install runtime deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install jsonschema pytest cryptography

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run quickstart smoke targets
        run: |
          make quickstart-py
          make quickstart-ts

      - name: Run template onboarding smoke target
        run: make template-smoke
